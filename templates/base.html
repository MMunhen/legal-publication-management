<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Legal Publication Management{% endblock %}</title>
</head>
<body>

    <header>
        <h1>Sistema de Publicidade Legal</h1>

        <nav>
            <a href="{% url 'home' %}">Início</a>

            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>

                <a href="{% url 'minha_conta' %}">Minha conta</a>

                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit">Sair</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Entrar</a>
                <a href="{% url 'cadastro_cliente' %}">Criar conta</a>
            {% endif %}
        </nav>

        <hr>
    </header>

    <main>
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
