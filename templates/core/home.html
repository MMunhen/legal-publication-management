{% extends 'base.html' %}

{% block title %}Início{% endblock %}

{% block content %}
    {% if user.is_authenticated %}
        <p>Bem-vindo, {{ user.username }}.</p>

        <a href="{% url 'dashboard' %}">Acessar Dashboard</a>
    {% else %}
        <h2>Bem-vindo</h2>

        <p>
            Acesse o sistema ou crie uma conta para acompanhar suas publicidades.
        </p>
    {% endif %}
{% endblock %}
