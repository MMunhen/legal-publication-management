{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header text-center">
                    <h4 class="mb-0">Entrar no sistema</h4>
                </div>

                <div class="card-body">
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            Usuário ou senha inválidos.
                        </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label">Usuário</label>
                            <input 
                                type="text" 
                                name="username" 
                                autofocus 
                                autocapitalize="none" 
                                autocomplete="username" 
                                maxlength="150" 
                                class="form-control" 
                                required 
                                id="id_username"
                            >
                        </div>

                        <div class="mb-3">
                            <label for="id_password" class="form-label">Senha</label>
                            <input 
                                type="password" 
                                name="password" 
                                autocomplete="current-password" 
                                class="form-control" 
                                required 
                                id="id_password"
                            >
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Entrar
                        </button>
                    </form>
                </div>

                <div class="card-footer text-center">
                    <small>
                        Ainda não tem conta?
                        <a href="{% url 'cadastro_cliente' %}">Criar conta</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
